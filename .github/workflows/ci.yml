name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    name: Build & Type Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -f dist/mainlayer.js || (echo "dist/mainlayer.js not found" && exit 1)
          test -f dist/middleware.js || (echo "dist/middleware.js not found" && exit 1)

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript strict mode
        run: npm run typecheck

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t paid-mcp-server:ci .

      - name: Verify image
        run: docker inspect paid-mcp-server:ci
